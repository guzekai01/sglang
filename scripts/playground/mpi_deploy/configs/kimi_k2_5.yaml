# ---------------------------------------------------------------------------
# Aggregated (prefill + decode on the same nodes) deployment config
# for Kimi-K2.5 on 2 nodes × 8 GPUs each (tp=16).
#
# Usage:
#   python3 deploy.py configs/kimi_k2_5.yaml
# ---------------------------------------------------------------------------

deploy:
  type: aggregated
  hostfile: /home/shared/pinyi/scripts/mpi_test/hosts
  gpu_num: 8
  nnode: 2

# Environment variables exported before each rank process.
env:
  NCCL_SOCKET_IFNAME: bond0
  NCCL_IB_DISABLE: 0
  NCCL_DEBUG: INFO
  NCCL_IB_GID_INDEX: 3
  NCCL_NET_PLUGIN: none
  NCCL_IB_ECE_ENABLE: 0
  NCCL_IB_TIMEOUT: 22
  MC_TE_METRIC: True
  SGLANG_TORCH_PROFILER_DIR: /root/sglang/profile_log
  SGLANG_TBO_DEBUG: True
  MC_ENABLE_DEST_DEVICE_AFFINITY: True
  GLOO_SOCKET_IFNAME: bond0

# CLI arguments forwarded to `python3 -m sglang.launch_server`.
# Nested dicts are automatically JSON-encoded.
sglang_args:
  model_path: /home/shared/pinyi/models/kimi-K2.5/
  host: "0.0.0.0"
  port: 30000
  tp_size: 16
  nnodes: 2
  dist_init_addr: "0.0.0.0:23456"
  trust_remote_code: true
  mem_fraction_static: 0.92
  chunked_prefill_size: 16384
  max_running_requests: 64
  mm_attention_backend: fa3
  attention_backend: fa3
  model_loader_extra_config:
    enable_multithread_load: true
    num_threads: 16
